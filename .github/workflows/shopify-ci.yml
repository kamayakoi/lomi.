name: Shopify App CI

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/plugins/shopify/**"
      - ".github/workflows/shopify-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/plugins/shopify/**"
      - ".github/workflows/shopify-ci.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/plugins/shopify
    env:
      SHOPIFY_API_KEY: ci-test-api-key
      SHOPIFY_API_SECRET: ci-test-api-secret
      SHOPIFY_APP_URL: https://connect.lomi.africa
      SHOPIFY_SCOPES: read_checkouts,read_orders,write_checkouts,write_orders,write_products
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ci-test-service-role-key
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/plugins/shopify/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
