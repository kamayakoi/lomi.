name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.changes.outputs.api }}
      docs: ${{ steps.changes.outputs.docs }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            api:
              - 'apps/api/**'
            docs:
              - 'apps/docs/**'

  verify-openapi:
    name: Verify OpenAPI spec is in sync
    needs: detect-changes
    if: github.event_name == 'pull_request' && (needs.detect-changes.outputs.api ==
      'true' || needs.detect-changes.outputs.docs == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/api/pnpm-lock.yaml
      - name: Install API dependencies
        working-directory: apps/api
        run: pnpm install --frozen-lockfile
      - name: Export OpenAPI from Nest
        working-directory: apps/api
        run: pnpm run openapi:export
      - name: Assert apps/docs/openapi.json matches export
        run: git diff --exit-code apps/docs/openapi.json

  verify-agent-contracts:
    name: Verify agent card + OpenAPI surface
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate `.well-known/agent.json` and OpenAPI paths
        run: node scripts/verify-agent-contracts.mjs

  api-tests:
    name: API unit tests, coverage gate & e2e
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/api/pnpm-lock.yaml
      - name: Install API dependencies
        working-directory: apps/api
        run: pnpm install --frozen-lockfile
      - name: Unit tests
        working-directory: apps/api
        env:
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_SECRET_KEY: ci-test-service-role-key
        run: pnpm test
      - name: Coverage (global thresholds)
        working-directory: apps/api
        env:
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_SECRET_KEY: ci-test-service-role-key
        run: pnpm test:cov
      - name: E2E smoke
        working-directory: apps/api
        env:
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_SECRET_KEY: ci-test-service-role-key
        run: pnpm test:e2e

  deploy-api:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true' && github.ref ==
      'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Deploy API to Vercel
        uses: amondnet/vercel-action@v42.2.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_API }}
          working-directory: ${{ github.workspace }}
          target: production

  deploy-docs:
    needs: detect-changes
    if: needs.detect-changes.outputs.docs == 'true' && github.ref ==
      'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Deploy Docs to Vercel
        uses: amondnet/vercel-action@v42.2.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_DOCS }}
          working-directory: ${{ github.workspace }}
          target: production
