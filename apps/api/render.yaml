# Render Blueprint — blueprint path: apps/api/render.yaml
# Operator reference: render.json (mirrors apps/mcp/railway.json conventions)
# Match the service region to your Supabase project region.
services:
  - type: web
    name: lomi-api
    runtime: node
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    startCommand: pnpm run start:prod
    healthCheckPath: /ready
    plan: standard
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '10000'
